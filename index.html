<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #111827;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
    #header-badge {
      margin-left: auto;
      font-size: 12px;
      color: #9ca3af;
      background: #1f2937;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .hidden { display: none !important; }

    /* ════════════════════════════════
       UPLOAD SCREEN
    ════════════════════════════════ */
    #upload-screen {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow-y: auto;
    }

    .upload-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.09);
      padding: 40px 48px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .upload-card-title h2 {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }
    .upload-card-title p {
      font-size: 14px;
      color: #6b7280;
    }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #6366f1;
      background: #eef2ff;
    }
    #drop-zone.has-file {
      border-color: #22c55e;
      background: #f0fdf4;
    }
    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    #drop-zone .dz-icon { font-size: 30px; margin-bottom: 8px; }
    #drop-zone .dz-hint { font-size: 14px; color: #6b7280; }
    #drop-zone .dz-hint strong { color: #6366f1; }
    #file-name {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #16a34a;
      min-height: 18px;
    }

    #jd-input {
      width: 100%;
      height: 118px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      resize: vertical;
      color: #111827;
      font-family: inherit;
      transition: border-color 0.2s;
      background: #fafafa;
    }
    #jd-input:focus { outline: none; border-color: #6366f1; background: #fff; }
    #jd-input::placeholder { color: #9ca3af; }

    #start-btn {
      background: #111827;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #start-btn:hover:not(:disabled) { background: #1f2937; }
    #start-btn:active:not(:disabled) { transform: scale(0.98); }
    #start-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    #upload-error {
      font-size: 13px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
    }

    /* ════════════════════════════════
       CHAT SCREEN
    ════════════════════════════════ */
    #chat-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #session-banner {
      background: #1f2937;
      color: #9ca3af;
      font-size: 12px;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: #34d399;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .welcome {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      padding: 18px 22px;
      font-size: 14px;
      color: #166534;
      line-height: 1.6;
      max-width: 580px;
      margin: 0 auto;
      text-align: center;
    }
    .welcome strong { display: block; font-size: 15px; margin-bottom: 4px; }

    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 760px;
      width: 100%;
    }
    .bubble-row.user { margin-left: auto; flex-direction: row-reverse; }
    .bubble-row.ai   { margin-right: auto; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .avatar.ai-av   { background: #e0e7ff; color: #4f46e5; }
    .avatar.user-av { background: #111827; color: #fff; }

    .bubble {
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      max-width: calc(100% - 44px);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.user {
      background: #111827;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.ai {
      background: #fff;
      color: #111827;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .bubble.err {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-bottom-left-radius: 4px;
    }

    /* Typing dots */
    .typing-bubble {
      padding: 14px 16px;
      background: #fff;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: tdot 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input bar */
    #input-bar {
      background: #fff;
      border-top: 1px solid #e5e7eb;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
      color: #111827;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #chat-input:focus { outline: none; border-color: #6366f1; }
    #chat-input::placeholder { color: #9ca3af; }

    #send-btn {
      background: #111827;
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 42px; height: 42px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover:not(:disabled) { background: #374151; }
    #send-btn:active:not(:disabled) { transform: scale(0.92); }
    #send-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <line x1="10" y1="9" x2="8" y2="9"/>
  </svg>
  <h1>Resume Analyzer</h1>
  <span id="header-badge">Upload to begin</span>
</header>

<!-- ══ UPLOAD SCREEN ══ -->
<div id="upload-screen">
  <div class="upload-card">
    <div class="upload-card-title">
      <h2>Analyze your resume</h2>
      <p>Upload your PDF and paste the job description to start an AI chat session.</p>
    </div>

    <div>
      <label class="field-label">Resume (PDF)</label>
      <div id="drop-zone">
        <input type="file" id="file-input" accept=".pdf" />
        <div class="dz-icon">📄</div>
        <div class="dz-hint">Drag &amp; drop here, or <strong>browse</strong></div>
        <div id="file-name"></div>
      </div>
    </div>

    <div>
      <label class="field-label" for="jd-input">Job Description</label>
      <textarea id="jd-input" placeholder="Paste the job description here…"></textarea>
    </div>

    <div id="upload-error" class="hidden"></div>

    <button id="start-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Start Chat
    </button>
  </div>
</div>

<!-- ══ CHAT SCREEN ══ -->
<div id="chat-screen" class="hidden">
  <div id="session-banner">
    <span class="live-dot"></span>
    Session active &mdash; <span id="sid-display"></span>
  </div>

  <div id="messages">
    <div class="welcome">
      <strong>🎉 Your resume is ready!</strong>
      Ask me anything — skills match, gaps, how to tailor your resume, interview tips, and more.
    </div>
  </div>

  <div id="input-bar">
    <textarea id="chat-input" rows="1" placeholder="Ask something about your resume…"></textarea>
    <button id="send-btn" title="Send (Enter)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let sessionId = null;

  const uploadScreen = document.getElementById('upload-screen');
  const chatScreen   = document.getElementById('chat-screen');
  const dropZone     = document.getElementById('drop-zone');
  const fileInput    = document.getElementById('file-input');
  const fileNameEl   = document.getElementById('file-name');
  const jdInput      = document.getElementById('jd-input');
  const startBtn     = document.getElementById('start-btn');
  const uploadError  = document.getElementById('upload-error');
  const messagesEl   = document.getElementById('messages');
  const chatInput    = document.getElementById('chat-input');
  const sendBtn      = document.getElementById('send-btn');
  const sidDisplay   = document.getElementById('sid-display');
  const headerBadge  = document.getElementById('header-badge');

  // ── Drag & drop ──
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) applyFile(f);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) applyFile(fileInput.files[0]);
  });

  function applyFile(f) {
    if (!f.name.toLowerCase().endsWith('.pdf')) {
      showUploadErr('Only PDF files are supported.');
      return;
    }
    fileInput._picked = f;
    fileNameEl.textContent = '✓  ' + f.name;
    dropZone.classList.add('has-file');
    hideUploadErr();
  }

  // ── Start chat ──
  startBtn.addEventListener('click', startChat);

  async function startChat() {
    const file = fileInput._picked || fileInput.files[0];
    const jd   = jdInput.value.trim();
    if (!file) { showUploadErr('Please upload your resume PDF.'); return; }
    if (!jd)   { showUploadErr('Please paste the job description.'); return; }
    hideUploadErr();

    startBtn.disabled = true;
    startBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Starting…';

    const fd = new FormData();
    fd.append('file', file);
    fd.append('jd_text', jd);

    try {
      const res = await fetch(`${API}/chat/start`, { method: 'POST', body: fd });
      if (!res.ok) {
        const txt = await res.text().catch(() => '');
        throw new Error(`Server error ${res.status}${txt ? ': ' + txt : ''}`);
      }
      const data = await res.json();
      sessionId = data.session_id;
      launchChat();
    } catch (err) {
      showUploadErr('Failed to start session — ' + err.message);
      startBtn.disabled = false;
      startBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start Chat';
    }
  }

  function launchChat() {
    uploadScreen.classList.add('hidden');
    chatScreen.classList.remove('hidden');
    sidDisplay.textContent = sessionId.slice(0, 8) + '…';
    headerBadge.textContent = 'Session active';
    chatInput.focus();
  }

  // ── Send message ──
  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  });

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text || !sessionId) return;

    chatInput.value = '';
    chatInput.style.height = 'auto';
    sendBtn.disabled = true;

    addBubble('user', text);
    const loader = addTyping();

    const fd = new FormData();
    fd.append('session_id', sessionId);
    fd.append('message', text);

    try {
      const res = await fetch(`${API}/chat/message`, { method: 'POST', body: fd });
      if (!res.ok) {
        const txt = await res.text().catch(() => '');
        throw new Error(`Server error ${res.status}${txt ? ': ' + txt : ''}`);
      }
      const data = await res.json();
      loader.remove();
      addBubble('ai', data.response);
    } catch (err) {
      loader.remove();
      addBubble('err', 'Error: ' + err.message);
    } finally {
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  // ── Bubble builders ──
  function addBubble(type, text) {
    const row = document.createElement('div');
    row.className = 'bubble-row ' + (type === 'user' ? 'user' : 'ai');

    const av = document.createElement('div');
    if (type === 'user') {
      av.className = 'avatar user-av';
      av.textContent = 'U';
    } else {
      av.className = 'avatar ai-av';
      av.textContent = 'AI';
    }

    const b = document.createElement('div');
    b.className = 'bubble ' + (type === 'user' ? 'user' : type === 'err' ? 'err' : 'ai');
    b.textContent = text;

    if (type === 'user') { row.appendChild(b); row.appendChild(av); }
    else                 { row.appendChild(av); row.appendChild(b); }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'bubble-row ai';

    const av = document.createElement('div');
    av.className = 'avatar ai-av';
    av.textContent = 'AI';

    const t = document.createElement('div');
    t.className = 'typing-bubble';
    t.innerHTML = '<span></span><span></span><span></span>';

    row.appendChild(av);
    row.appendChild(t);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  // ── Error helpers ──
  function showUploadErr(msg) {
    uploadError.textContent = msg;
    uploadError.classList.remove('hidden');
  }
  function hideUploadErr() {
    uploadError.classList.add('hidden');
  }
</script>
</body>
</html>
